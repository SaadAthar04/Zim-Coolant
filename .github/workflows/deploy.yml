name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

concurrency:
  group: vps-deploy
  cancel-in-progress: true   # if you push twice quickly, only the latest deploys

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "::group::Key sanity check"
          echo "Expected fingerprint: SHA256:sL0vJBkX1/JePVqFdsLqgYQ4onc/wr3rMIGXxVqFjL8"
          echo -n "Actual fingerprint:   "
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "!! KEY FAILED TO PARSE — secret is corrupted !!"
          echo "Connecting as user: [$VPS_USER] to host: [$VPS_HOST]"
          echo "::endgroup::"

          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/htdocs/zimchemicals.com
            git pull origin main
            npm ci
            npm run build
            pm2 restart zim-coolant --update-env
          REMOTE
