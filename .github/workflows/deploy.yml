name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

concurrency:
  group: vps-deploy
  cancel-in-progress: true   # if you push twice quickly, only the latest deploys

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          # Strip any stray whitespace/newlines that may have crept into the secrets
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '[:space:]')"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/htdocs/zimchemicals.com
            git pull origin main
            npm ci
            npm run build
            pm2 restart zim-coolant --update-env
          REMOTE
